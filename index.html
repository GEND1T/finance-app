<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App - Dashboard</title>
    
    <link href="./dist/output.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* gray-100 */
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="antialiased text-gray-800 flex justify-center">
    <div id="loading-overlay" class="fixed inset-0 z-[9999] hidden flex-col justify-center items-center bg-white/80 backdrop-blur-md transition-opacity duration-300">
        <div class="relative w-24 h-24 mb-6">
            <div class="absolute inset-0 border-4 border-indigo-100 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center text-indigo-600 animate-pulse">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
            </div>
        </div>
        <h2 class="text-2xl font-extrabold text-gray-900 animate-pulse">Memindai Struk...</h2>
        <p class="text-sm text-gray-500 mt-2 text-center px-8 font-medium">AI Sedang bekerja mengekstrak data dari gambarmu. Mohon tunggu sebentar.</p>
    </div>
    <main class="w-full max-w-md min-h-screen bg-gray-50 shadow-2xl overflow-hidden relative pb-28">
        
        <section class="bg-gradient-to-br from-blue-500 to-blue-800 rounded-b-[2.5rem] p-6 text-white pb-10">
            <header class="flex justify-between items-center mb-8 mt-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center overflow-hidden border-2 border-white/50">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Afin" alt="Avatar" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <p class="text-blue-100 text-sm">Good Day!</p>
                        <h1 class="text-xl font-bold tracking-wide">Afin Aditya</h1>
                    </div>
                </div>
                <button class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center relative hover:bg-white/20 transition">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    <span class="absolute top-2 right-2.5 w-2 h-2 bg-red-500 rounded-full border border-blue-600"></span>
                </button>
            </header>

            <div class="bg-white/20 backdrop-blur-md border border-white/10 rounded-3xl p-6 relative shadow-[0_8px_30px_rgb(0,0,0,0.12)]">
                <p class="text-blue-100 text-sm mb-1 font-medium">Current Balance</p>
                <h2 id="current-balance" class="text-4xl font-extrabold tracking-tight mb-2">Rp 0</h2>
                
                <button id="btn-manual-add" class="absolute top-6 right-6 w-10 h-10 bg-white text-blue-600 rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition transform">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
            </div>
            <div id="wallets-container" class="mt-5 flex gap-3 overflow-x-auto pb-2 snap-x hide-scrollbar">

            </div>
            </section>
        </section>

        <section class="px-6 -mt-5 relative z-10">
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 rounded-xl p-4 shadow-lg flex items-start gap-3">
                <div class="bg-white/20 rounded-full p-1 mt-0.5">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                </div>
                <div>
                    <h3 class="text-white font-bold text-sm">Analisis Pengeluaran</h3>
                    <p id="ai-analysis-text" class="text-orange-50 text-xs mt-1 leading-relaxed">
                        Sedang menganalisis pola pengeluaranmu...
                    </p>
                </div>
            </div>
        </section>

        <section class="px-6 mt-8">
            <div class="flex justify-between items-end mb-4">
                <h3 class="font-bold text-gray-900 text-lg">Upcoming payment</h3>
                <button class="text-sm text-blue-600 font-semibold hover:underline">See all</button>
            </div>
            <div id="subscriptions-container" class="flex gap-4 overflow-x-auto pb-4 snap-x hide-scrollbar">
            </div>
        </section>

        <section class="px-6 mt-4 mb-8">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <h3 class="font-bold text-gray-900 text-lg">Recent Transactions</h3>
                    <div class="inline-flex items-center gap-1.5 bg-red-50 border border-red-100 px-2.5 py-1 rounded-lg mt-1.5">
                        <svg class="w-3.5 h-3.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"/></svg>
                        <p class="text-xs font-medium text-red-600">Terpakai hari ini: <span id="today-expense" class="font-bold">Rp 0</span></p>
                    </div>
                </div>
                <button class="w-8 h-8 bg-white border border-gray-200 rounded-full flex items-center justify-center text-gray-600 shadow-sm hover:bg-gray-50 transition mb-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                </button>
            </div>            
            <div class="space-y-3">
                <div id="transactions-container" class="space-y-3">
                </div>
            </div>
        </section>

        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 px-6 py-4 flex justify-between items-center rounded-t-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.06)] z-50">
            <button class="flex flex-col items-center gap-1 text-blue-600 group">
                <div class="bg-blue-50 p-2 rounded-xl group-hover:bg-blue-100 transition">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                </div>
            </button>
            
            <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition pr-6">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
            </button>

            <div class="absolute left-1/2 bottom-6 transform -translate-x-1/2">
                <label for="receipt-upload" class="w-16 h-16 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-[0_8px_25px_rgba(79,70,229,0.5)] border-[6px] border-gray-50 hover:scale-105 hover:bg-indigo-700 transition duration-300 cursor-pointer">
                    <input type="file" id="receipt-upload" class="hidden" accept="image/*">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                </label>
            </div>

            <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition pl-6">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            </button>
            
            <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </button>
        </nav>

        

        <script src="./js/main.js" type="module"></script>
    </main> <div id="add-trx-modal" class="fixed inset-0 z-[999] hidden flex justify-center items-end pointer-events-none">
        
        <div id="modal-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm cursor-pointer opacity-0 transition-opacity duration-300 pointer-events-auto"></div>
        
        <div id="modal-sheet" class="relative w-full max-w-md bg-white rounded-t-[2rem] px-6 pt-6 pb-12 shadow-2xl transition-transform duration-300 translate-y-full max-h-[90vh] overflow-y-auto pointer-events-auto">
            
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            
            <h3 class="text-xl font-bold text-gray-900 mb-5">Catat Transaksi</h3>
            
            <form id="add-trx-form" class="space-y-4">
                <div class="flex gap-3">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="trx_type" value="expense" class="peer sr-only" checked>
                        <div class="text-center py-2.5 rounded-xl border-2 border-gray-100 peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:text-red-600 font-bold text-gray-400 transition">Keluar</div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="trx_type" value="income" class="peer sr-only">
                        <div class="text-center py-2.5 rounded-xl border-2 border-gray-100 peer-checked:border-green-500 peer-checked:bg-green-50 peer-checked:text-green-600 font-bold text-gray-400 transition">Masuk</div>
                    </label>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Nominal (Rp)</label>
                    <input type="number" id="trx-amount" class="w-full text-3xl font-bold border-b-2 border-gray-200 focus:border-indigo-500 outline-none py-1 bg-transparent" placeholder="0" required>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1">Keterangan</label>
                        <input type="text" id="trx-title" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Makan, Gaji, dll" required autocomplete="off">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1">Kategori</label>
                        <select id="trx-category" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 font-medium appearance-none">
                            </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1">Gunakan Dompet</label>
                        <select id="trx-wallet" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 font-medium appearance-none">
                            </select>
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-bold text-lg py-3.5 rounded-2xl shadow-[0_8px_20px_rgba(79,70,229,0.3)] hover:bg-indigo-700 transition transform hover:scale-[1.02] mt-4">
                    Simpan Data
                </button>
            </form>
        </div>
    </div>
</body>
</html>
