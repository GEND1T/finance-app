<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Keuangan</title>
    <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg flex flex-col">
        <!-- Header -->
        <header class="p-4 border-b">
            <h1 class="text-xl font-bold text-gray-800">Laporan Bulan Ini</h1>
        </header>

        <main class="p-4 space-y-6">
            <!-- Pecahan Pengeluaran (Pie Chart Card) -->
            <section class="bg-gray-50 rounded-2xl p-4 border border-gray-100">
                <h2 class="text-sm font-semibold text-gray-500 mb-4 uppercase tracking-wider">Pecahan Pengeluaran</h2>
                <div class="flex flex-col items-center">
                    <!-- Placeholder Pie Chart -->
                    <div class="w-40 h-40 rounded-full border-8 border-blue-500 flex items-center justify-center mb-6 relative">
                        <div class="absolute inset-0 border-8 border-red-400 rounded-full" style="clip-path: polygon(50% 50%, 100% 0, 100% 100%, 0 100%);"></div>
                        <span class="text-xs text-gray-400">Pie Chart</span>
                    </div>
                    
                    <!-- Daftar Persentase -->
                    <div class="w-full space-y-2">
                        <div class="flex justify-between items-center text-sm">
                            <div class="flex items-center"><span class="w-3 h-3 bg-blue-500 rounded-full mr-2"></span> Makanan</div>
                            <span class="font-bold">45%</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <div class="flex items-center"><span class="w-3 h-3 bg-red-400 rounded-full mr-2"></span> Transportasi</div>
                            <span class="font-bold">30%</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <div class="flex items-center"><span class="w-3 h-3 bg-gray-300 rounded-full mr-2"></span> Lainnya</div>
                            <span class="font-bold">25%</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Prediksi Pengeluaran Akhir Bulan -->
            <section class="space-y-4">
                <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Prediksi Pengeluaran Akhir Bulan</h2>
                <div class="bg-blue-600 rounded-2xl p-5 text-white shadow-md">
                    <p class="text-xs opacity-80">Perkiraan Sisa Saldo</p>
                    <p class="text-2xl font-bold">Rp 1.250.000</p>
                </div>

                <!-- Placeholder Grafik Garis -->
                <div class="h-40 w-full bg-gray-50 rounded-xl border border-dashed border-gray-300 flex flex-col items-center justify-center relative overflow-hidden">
                    <p class="text-xs text-gray-400 mb-2">Tren Belanja vs Budget</p>
                    <svg class="w-full h-20 px-4" viewBox="0 0 100 40">
                        <!-- Budget Line (Static) -->
                        <line x1="0" y1="10" x2="100" y2="10" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2"/>
                        <!-- Actual Trend (Downward) -->
                        <path d="M0 5 Q 25 15, 50 25 T 100 38" fill="none" stroke="#3b82f6" stroke-width="2" />
                    </svg>
                    <div class="flex justify-between w-full px-4 mt-2 text-[10px] text-gray-400">
                        <span>Tgl 1</span>
                        <span>Tgl 30</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
