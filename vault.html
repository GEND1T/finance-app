<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Keuangan</title>
    <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg flex flex-col">
        <!-- Header -->
        <header class="p-4 border-b">
            <h1 class="text-xl font-bold text-gray-800">Tabungan & Target</h1>
        </header>

        <main class="p-4 space-y-6">
            <!-- Section Micro-Saving -->
            <section class="bg-green-50 p-4 rounded-2xl border border-green-100">
                <div class="flex justify-between items-start">
                    <div class="pr-4">
                        <h2 class="font-bold text-green-800">Fitur Micro-Saving</h2>
                        <p class="text-xs text-green-700 mt-1">Bulatkan setiap transaksi Anda dan tabung selisihnya secara otomatis.</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" value="" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                    </label>
                </div>
            </section>

            <!-- Section Target Tabungan -->
            <section class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-gray-800">Target Tabungan</h2>
                    <button class="text-sm text-green-600 font-semibold">+ Tambah</button>
                </div>

                <!-- Card 1 -->
                <div class="p-4 border rounded-2xl shadow-sm space-y-3">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-blue-100 rounded-lg text-blue-600">💻</div>
                            <span class="font-semibold text-gray-700">Laptop Baru</span>
                        </div>
                        <span class="text-sm font-bold text-gray-800">Rp 12.000.000</span>
                    </div>
                    <div class="space-y-1">
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-green-500 h-2 rounded-full" style="width: 65%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] text-gray-500 font-medium">
                            <span>Terkumpul: Rp 7.800.000</span>
                            <span>65%</span>
                        </div>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="p-4 border rounded-2xl shadow-sm space-y-3">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-orange-100 rounded-lg text-orange-600">✈️</div>
                            <span class="font-semibold text-gray-700">Liburan</span>
                        </div>
                        <span class="text-sm font-bold text-gray-800">Rp 5.000.000</span>
                    </div>
                    <div class="space-y-1">
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-green-500 h-2 rounded-full" style="width: 30%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] text-gray-500 font-medium">
                            <span>Terkumpul: Rp 1.500.000</span>
                            <span>30%</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
